<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tic Tac Toe</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="game">
    <h2>Tic Tac Toe</h2>
    <select id="mode">
        <option value="pvp">Player vs Player</option>
        <option value="ai">Player vs Computer</option>
    </select>
    <div class="board" id="board"></div>
    <h3 id="status">Player X's Turn</h3>
    <button onclick="resetGame()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
        Restart
    </button>
</div>
<script src="script.js"></script>
</body>
</html>
