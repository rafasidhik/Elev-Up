<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <h2>Registration Form</h2>
        <form id="signupForm">
            <div class="input-field">
                <label>Your Name:</label>
                <input type="text" id="username" placeholder="Enter your full name">
                <p class="error" id="usernameError"></p>
            </div>
            <div class="input-field">
                <label>Email Address:</label>
                <input type="text" id="signupEmail" placeholder="Enter your email">
                <p class="error" id="signupEmailError"></p>
            </div>
            <div class="input-field">
                <label>Create Password:</label>
                <input type="password" id="signupPassword" placeholder="Enter your password">
                <p class="error" id="signupPasswordError"></p>
            </div>
            <div class="input-field">
                <label>Confirm Password:</label>
                <input type="password" id="confirmPassword" placeholder="Repeat your password">
                <p class="error" id="confirmPasswordError"></p>
            </div>    
            <button type="submit">Register Account</button>
        </form>    
        <p class="footer-text">
            Already have an account? <a href="login.html">Login here</a>
        </p>
    </div>
    <script src="script.js"></script>
</body>
</html>
