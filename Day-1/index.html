<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portraits Gallery</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

    <div class="logo">
        📸 Portraits
    </div>

    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">Explore</a></li>
        <li><a href="#">Categories</a></li>
        <li><a href="#">Collections</a></li>
    </ul>

    <div class="profile">
        <i class="fa-solid fa-user"></i>
    </div>

</nav>

<!-- HERO SECTION -->

<section class="hero">

    <h1>Discover Stunning Moments Through Photography</h1>

    <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>

        <input type="text"
        placeholder="Search photos, artists, collections...">
    </div>

</section>

<!-- GALLERY -->

<section class="gallery">

    <div class="card large">
        <img src="img1.jpg">
    </div>

    <div class="card medium">
        <img src="img2.jpg">
    </div>

    <div class="card short">
        <img src="img3.jpg">
    </div>

    <div class="card short">
        <img src="img4.jpg">
    </div>

    <div class="card large">
        <img src="img5.jpg">
    </div>

    <div class="card medium">
        <img src="img6.jpg">
    </div>

    <div class="card medium">
        <img src="img7.jpg">
    </div>

    <div class="card short">
        <img src="img8.jpg">
    </div>

    <div class="card large">
        <img src="img9.jpg">
    </div>

</section>

<!-- LOAD MORE BUTTON -->

<div class="load-more-container">

    <button class="load-more-btn">
        <i class="fa-solid fa-plus"></i>
        Load More
    </button>

</div>

<!-- FOOTER -->

<footer>

    <p>Portraits © 2026</p>

    <div class="footer-links">
        <a href="#">About</a>
        <a href="#">Contact</a>
        <a href="#">Privacy Policy</a>
    </div>

</footer>

</body>
</html>
