<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Budget & Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Budget & Expense Tracker</h1>

        <!-- Top Dashboard Balance Metrics -->
        <div class="dashboard">
            <div class="card status-budget">
                <h3>Total Budget</h3>
                <p id="total-budget">₹0</p>
            </div>
            <div class="card status-expense">
                <h3>Total Expenses</h3>
                <p id="total-expenses">₹0</p>
            </div>
            <div class="card status-balance">
                <h3>Remaining Balance</h3>
                <p id="remaining-balance">₹0</p>
            </div>
        </div>

        <!-- Asymmetric Forms & Table Split Layout -->
        <div class="main-content">
            <div class="form-section">
                <div class="form-card">
                    <h3>Set Monthly Budget</h3>
                    <form id="budget-form">
                        <input type="number" id="budget-input" placeholder="Enter Total Budget (₹)" required>
                        <button type="submit">Set Budget</button>
                    </form>
                </div>

                <div class="form-card">
                    <h3>Add New Expense</h3>
                    <form id="expense-form">
                        <input type="text" id="expense-title" placeholder="Where did you spend? (e.g., Food)" required>
                        <input type="number" id="expense-amount" placeholder="Amount (₹)" required>
                        <select id="expense-category" required>
                            <option value="" disabled selected>Select Category</option>
                            <option value="Housing">Housing (Rent/EMI)</option>
                            <option value="Groceries">Groceries & Staples</option>
                            <option value="Transportation">Transportation & Fuel</option>
                            <option value="Utilities">Utilities (Gas/Electric)</option>
                            <option value="Communication">Communication (Internet/Phone)</option>
                            <option value="Healthcare">Healthcare & Insurance</option>
                            <option value="Food">Dining & Delivery</option>
                            <option value="Education">Education & College</option>
                            <option value="Entertainment">Entertainment & Subscriptions</option>
                            <option value="Others">Others/Miscellaneous</option>
                        </select>
                        <button type="submit">Add Expense</button>
                    </form>
                </div>
            </div>

            <div class="history-section">
                <h3>Expense History Logs</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Category</th>
                                <th>Amount</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="expense-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
